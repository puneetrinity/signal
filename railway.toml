# Railway configuration
# Start command should be set per-service in Railway dashboard:
# - signal: npm run start (default)
# - enrichment-worker: npm run worker:enrichment

[build]
builder = "nixpacks"

[deploy]
# Don't set startCommand here - let each service configure its own in dashboard
#
# healthcheckPath is NOT set here because this railway.toml is shared across
# all services (signal, worker-enrich, worker-sourcing). Each service has a
# different health endpoint:
#   - signal:          /api/health   (set in Railway dashboard)
#   - worker-enrich:   /health       (set in Railway dashboard)
#   - worker-sourcing: /health       (set in Railway dashboard)
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Migrations are handled by the start script (migrate-with-baseline.sh)
# Do not duplicate them here to avoid double-migration on each deploy
